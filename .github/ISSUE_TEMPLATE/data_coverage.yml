name: Data coverage request
description: Request support for more official Strava API data
labels: [enhancement, data coverage]
body:
  - type: markdown
    attributes:
      value: "Requests should point to official Strava API docs when possible. This project does not use private/internal Strava APIs."
  - type: input
    id: endpoint
    attributes:
      label: Official Strava API endpoint or doc URL
      placeholder: https://developers.strava.com/docs/reference/
  - type: textarea
    id: use_case
    attributes:
      label: Agent use case
      description: What should an AI agent be able to answer or do with this data?
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy considerations
      description: Does this data include sensitive health details, location, identity, or anything that should be redacted?
